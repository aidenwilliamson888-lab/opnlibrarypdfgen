<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>📚 OpenLibrary PDF Generator - Gambar Siap</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:Arial, Helvetica, sans-serif; }
body { background:#1a2f3f; display:flex; justify-content:center; padding:20px; }
.container { max-width:1000px; width:100%; background:white; border-radius:30px; padding:25px; box-shadow:0 20px 40px rgba(0,0,0,0.5); border:3px solid #ffaa33; }
h1 { color:#102060; border-left:10px solid #ffaa33; padding-left:20px; margin-bottom:20px; }
.preview-badge { background:#ffaa33; color:#000; padding:5px 15px; border-radius:50px; display:inline-block; margin-bottom:20px; font-weight:bold; }
.form-panel { background:#fff7e8; border-radius:20px; padding:20px; border:3px solid #ffaa33; margin-top:20px; }
.form-group { margin-bottom:20px; }
label { display:block; font-weight:bold; color:#1e3b4f; margin-bottom:5px; }
input, select { width:100%; padding:12px; border:2px solid #ccddee; border-radius:12px; font-size:14px; }
input:focus { outline:none; border-color:#ffaa33; }
.workid-row { display:flex; gap:10px; }
.workid-row button { background:#1e3b4f; color:white; border:none; border-radius:12px; padding:0 20px; font-weight:bold; cursor:pointer; }
.download-row { background:#fff0d4; padding:15px; border-radius:12px; border-left:8px solid #ffaa33; }
.gen-btn { background:#ffaa33; border:none; border-radius:50px; padding:18px; font-size:20px; font-weight:bold; width:100%; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:15px; box-shadow:0 8px 0 #b87d1f; transition:0.1s; margin-top:15px; }
.gen-btn:active { transform:translateY(5px); box-shadow:0 3px 0 #b87d1f; }
#status { margin-top:15px; padding:10px; border-radius:10px; background:#e5f0ff; }
.cover-preview { max-width:150px; margin:10px auto; display:block; border-radius:8px; box-shadow:0 4px 8px rgba(0,0,0,0.2); }
.image-url-info { background:#e6f3ff; padding:15px; border-radius:8px; margin:10px 0; border-left:5px solid #ffaa33; }
.test-btn { background:#4CAF50; color:white; border:none; border-radius:4px; padding:5px 10px; margin-left:10px; cursor:pointer; font-size:12px; }
</style>
</head>
<body>
<div class="container">
<h1>📄 OPENLIBRARY PDF GENERATOR</h1>
<div class="preview-badge">⚡ Gambar Siap Pakai</div>

<div class="form-panel">
<div class="image-url-info">
<strong>🖼️ GAMBAR UNTUK HALAMAN 2:</strong><br>
<select id="imageSelect" style="width:100%; margin:10px 0; padding:8px;">
<option value="https://picsum.photos/800/1000?random=1">Random Image 1 (Placeholder)</option>
<option value="https://picsum.photos/800/1000?random=2">Random Image 2 (Placeholder)</option>
<option value="https://picsum.photos/800/1000?random=3">Random Image 3 (Placeholder)</option>
<option value="custom">Custom URL</option>
</select>
<div id="customUrlContainer" style="display:none; margin-top:10px;">
<input type="text" id="customImageUrl" placeholder="https://...">
<button class="test-btn" id="testImageBtn">Test Load</button>
</div>
<div id="imageTestResult" style="font-size:12px; margin-top:5px;"></div>
</div>

<div class="form-group">
<label>📌 OPENLIBRARY WORK ID</label>
<div class="workid-row">
<input type="text" id="workId" value="OL554603W" placeholder="contoh: OL554603W">
<button id="fetchBtn"><i class="fas fa-download"></i> FETCH</button>
</div>
<div id="bookInfo" style="margin-top:10px; padding:10px; background:#f0f0f0; border-radius:8px;">
To Sir Phillip, With Love - Julia Quinn
</div>
<div id="coverPreview" style="text-align:center; margin-top:10px;"></div>
</div>

<div class="form-group download-row">
<label>🔗 LINK DOWNLOAD (ISI MANUAL)</label>
<input type="text" id="downloadLink" value="https://magafiles.com/1863142" placeholder="https://...">
</div>

<button class="gen-btn" id="generateBtn">
📦 GENERATE PDF
</button>
<div id="status"></div>
</div>
</div>

<script>
// Data buku default
let currentBook = {
title: 'To Sir Phillip, With Love',
author: 'Julia Quinn',
id: 'OL554603W',
coverUrl: 'https://covers.openlibrary.org/b/id/12389591-L.jpg'
};

// Handle image select
document.getElementById('imageSelect').addEventListener('change', function() {
if (this.value === 'custom') {
document.getElementById('customUrlContainer').style.display = 'block';
} else {
document.getElementById('customUrlContainer').style.display = 'none';
}
});

// Test image load
document.getElementById('testImageBtn').addEventListener('click', function() {
const url = document.getElementById('customImageUrl').value;
const resultDiv = document.getElementById('imageTestResult');
resultDiv.innerHTML = '⏳ Testing...';
const img = new Image();
img.crossOrigin = 'Anonymous';
img.onload = () => resultDiv.innerHTML = '✅ Gambar bisa diload!';
img.onerror = () => resultDiv.innerHTML = '❌ Gambar gagal diload, cek URL';
img.src = url;
});

// Fetch dari OpenLibrary
document.getElementById('fetchBtn').addEventListener('click', async () => {
const workId = document.getElementById('workId').value.trim();
const statusDiv = document.getElementById('bookInfo');
const coverPreview = document.getElementById('coverPreview');
if (!workId) return;
statusDiv.innerHTML = '⏳ Fetching...';
try {
const res = await fetch(`https://openlibrary.org/works/${workId}.json`);
if (!res.ok) throw new Error('Tidak ditemukan');
const data = await res.json();
let authorName = 'Unknown';
if (data.authors && data.authors[0]) {
const authorKey = data.authors[0].author.key;
const authorRes = await fetch(`https://openlibrary.org${authorKey}.json`);
const authorData = await authorRes.json();
authorName = authorData.name;
}

let coverUrl = 'https://covers.openlibrary.org/b/id/12389591-L.jpg';
try {
const searchRes = await fetch(`https://openlibrary.org/search.json?title=${encodeURIComponent(data.title)}&limit=1`);
const searchData = await searchRes.json();
if (searchData.docs && searchData.docs[0] && searchData.docs[0].cover_i) {
coverUrl = `https://covers.openlibrary.org/b/id/${searchData.docs[0].cover_i}-L.jpg`;
}
} catch (e) {}

currentBook = { 
title: data.title, 
author: authorName, 
id: workId,
coverUrl: coverUrl
};

statusDiv.innerHTML = `<b>${data.title}</b> - ${authorName}`;
coverPreview.innerHTML = `<img src="${coverUrl}" class="cover-preview" alt="cover" onerror="this.src='https://covers.openlibrary.org/b/id/12389591-L.jpg'">`;
} catch (error) {
statusDiv.innerHTML = `❌ Error: ${error.message}`;
}
});

// Fungsi generate baris angka
function generateNumberLine() {
let line = '';
for (let i = 1; i <= 154; i++) {
if (i % 10 === 0) {
line += (i/10) + ' ';
} else {
line += '1 ';
}
}
return line.trim();
}

// Varian teks promosi
const promoTexts = [
"This preview page introduces key concepts discussed throughout the ebook. The full ebook is available by returning to page 1 and clicking download.",
"This page provides a short overview of ideas explored in the full publication. To continue reading, please return to the first page and download the PDF.",
"This section highlights themes that are expanded in later chapters. To download the full ebook, please return to page 1 and click the download button.",
"This preview contains selected information from the original ebook. For access to the complete PDF, go back to page 1 and use the download link.",
"This page summarizes important ideas presented in the complete book. The full ebook is available by returning to page 1 and clicking download."
];

// Generate PDF
document.getElementById('generateBtn').addEventListener('click', async () => {
const { jsPDF } = window.jspdf;
const status = document.getElementById('status');
status.innerHTML = '⏳ Membuat PDF...';

try {
const downloadLink = document.getElementById('downloadLink').value;
const imageSelect = document.getElementById('imageSelect').value;
const customUrl = document.getElementById('customImageUrl').value;
const imageUrl = imageSelect === 'custom' ? customUrl : imageSelect;
const book = currentBook;

const pdf = new jsPDF({
orientation: 'portrait',
unit: 'pt',
format: 'a4'
});

const pageWidth = pdf.internal.pageSize.getWidth();
const pageHeight = pdf.internal.pageSize.getHeight();
const leftMargin = 50;
const centerX = pageWidth / 2;

// ===== HALAMAN 1: COVER =====
pdf.setFillColor(255, 255, 255);
pdf.rect(0, 0, pageWidth, pageHeight, 'F');

try {
const img = new Image();
img.crossOrigin = 'Anonymous';
img.src = book.coverUrl;
await new Promise((resolve, reject) => {
img.onload = resolve;
img.onerror = reject;
setTimeout(reject, 3000);
});
pdf.addImage(img, 'JPEG', centerX - 100, 40, 200, 300);
} catch (e) {
console.log('Gagal load cover, lanjut tanpa cover');
}

const titleText = `**!Download** ${book.title} by ${book.author}.pdf`;
pdf.setFont('helvetica', 'bold');
pdf.setFontSize(16);
pdf.setTextColor(0, 0, 0);
pdf.text(titleText, centerX, 380, { align: 'center' });

pdf.setFont('helvetica', 'normal');
pdf.setFontSize(12);
let yPos = 430;

const descLines = [
`Download or Read Online ${book.title} free ebook (PDF ePub Mobi) - ${book.author}`,
``,
`Ebook PDF ${book.title} | EBOOK ONLINE DOWNLOAD`,
`If you want to download free Ebook, you are in the right place to download Ebook.`,
`Ebook/PDF ${book.title} DOWNLOAD in English is available for free here.`,
`Click on the download LINK below to download Ebook ${book.title} PDF Download by ${book.author} (Author).`
];

descLines.forEach(line => {
if (line === '') {
yPos += 10;
} else {
pdf.text(line, centerX, yPos, { align: 'center' });
yPos += 20;
}
});

const btnX = (pageWidth - 280) / 2;
const btnY = 650;
pdf.setFillColor(16, 32, 96);
pdf.roundedRect(btnX, btnY, 280, 52, 10, 10, 'F');
pdf.setTextColor(255, 255, 255);
pdf.setFontSize(16);
pdf.setFont('helvetica', 'bold');
pdf.text('DOWNLOAD PDF', centerX, btnY + 32, { align: 'center' });
pdf.link(btnX, btnY, 280, 52, { url: downloadLink });

// ===== HALAMAN 2: GAMBAR DARI HOSTING =====
pdf.addPage();
pdf.setFillColor(255, 255, 255);
pdf.rect(0, 0, pageWidth, pageHeight, 'F');

if (imageUrl) {
try {
const page2Img = new Image();
page2Img.crossOrigin = 'Anonymous';
page2Img.src = imageUrl;
await new Promise((resolve, reject) => {
page2Img.onload = resolve;
page2Img.onerror = reject;
});
pdf.addImage(page2Img, 'JPEG', 0, 0, pageWidth, pageHeight);
status.innerHTML = '✅ Gambar halaman 2 sukses diload';
} catch (e) {
console.log('Gagal load gambar halaman 2');
pdf.setFontSize(20);
pdf.setTextColor(255, 0, 0);
pdf.text('GAMBAR TIDAK DAPAT DILOAD', centerX, pageHeight/2, { align: 'center' });
pdf.setFontSize(12);
pdf.setTextColor(0, 0, 255);
pdf.text('Cek URL gambar Anda', centerX, pageHeight/2 + 30, { align: 'center' });
}
}

// ===== HALAMAN 3-10: FULL ANGKA =====
for (let page = 3; page <= 10; page++) {
pdf.addPage();
pdf.setFillColor(255, 255, 255);
pdf.rect(0, 0, pageWidth, pageHeight, 'F');

let yPos = 50;
pdf.setFont('courier', 'normal');
pdf.setFontSize(9);
pdf.setTextColor(80, 80, 80);

for (let row = 0; row < 40; row++) {
pdf.text(generateNumberLine(), leftMargin, yPos);
yPos += 20;
}
}

// ===== HALAMAN 11-20: TEKS PROMOSI =====
for (let page = 11; page <= 20; page++) {
pdf.addPage();
pdf.setFillColor(255, 255, 255);
pdf.rect(0, 0, pageWidth, pageHeight, 'F');

pdf.setFont('helvetica', 'bold');
pdf.setFontSize(18);
pdf.setTextColor(0, 0, 0);
pdf.text(book.title, centerX, 100, { align: 'center' });

const promoIndex = (page - 11) % 5;
pdf.setFont('helvetica', 'normal');
pdf.setFontSize(12);
pdf.setTextColor(60, 60, 60);

const words = promoTexts[promoIndex].split(' ');
let line = '';
let yText = 180;
for (let i = 0; i < words.length; i++) {
line += words[i] + ' ';
if (i % 12 === 11 || i === words.length - 1) {
pdf.text(line, leftMargin + 20, yText);
line = '';
yText += 25;
}
}

pdf.setFontSize(10);
pdf.setTextColor(150, 150, 150);
pdf.text('Kembali ke halaman pertama dan klik link di atas', centerX, pageHeight - 50, { align: 'center' });
}

const filename = `${book.title.replace(/[^a-z0-9]/gi, '_')}_${book.id}.pdf`;
pdf.save(filename);
status.innerHTML = '✅ PDF BERHASIL!';

} catch (error) {
status.innerHTML = `❌ Error: ${error.message}`;
console.error(error);
}
});

window.addEventListener('load', () => {
document.getElementById('fetchBtn').click();
});
</script>
</body>
</html>
