  JP_FONT=btoa([...new Uint8Array(b)].map(x=>String.fromCharCode(x)).join(''));

}

/* ===== OPENLIBRARY FETCH FUNCTION ===== */
async function fetchFromOpenLibrary(asin, row) {
  const statusSpan = row.querySelector('.fetch-status') || document.createElement('span');
  statusSpan.className = 'status-fetch';
  statusSpan.innerHTML = '⏳ Fetching...';
  row.querySelector('td:nth-child(7)').appendChild(statusSpan);
  
  try {
    // Coba cari di OpenLibrary dengan ASIN/Work ID
    let workId = asin;
    let data = null;
    
    // Coba search dulu
    const searchRes = await fetch(`https://openlibrary.org/search.json?q=${encodeURIComponent(asin)}&limit=1`);
    const searchData = await searchRes.json();
    
    if (searchData.docs && searchData.docs.length > 0) {
      const doc = searchData.docs[0];
      const title = doc.title;
      const author = doc.author_name ? doc.author_name[0] : 'Unknown';
      const coverId = doc.cover_i;
      
      // Update fields
      row.querySelector('.pdf').value = title;
      row.querySelector('.title').value = title;
      row.querySelector('.author').value = author;
      
      // Update preview gambar
      if (coverId) {
        row.querySelector('img').src = `https://covers.openlibrary.org/b/id/${coverId}-L.jpg`;
      }
      
      statusSpan.innerHTML = '✅ OpenLibrary OK';
      setTimeout(() => statusSpan.remove(), 3000);
    } else {
      statusSpan.innerHTML = '❌ Not found';
    }
  } catch (error) {
    console.error(error);
    statusSpan.innerHTML = '❌ Error';
  }
}

/* ===== UTIL ===== */
function slugify(t){
return t.normalize('NFD').replace(/[\u0300-\u036f]/g,'')
.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'');
}

async function loadImg(src){
const i=new Image();i.src=src;await new Promise(r=>i.onload=r);
const c=document.createElement('canvas');
c.width=i.width;c.height=i.height;
c.getContext('2d').drawImage(i,0,0);
return c.toDataURL('image/jpeg',0.55);
}

/* ===== PDF ===== */
async function buildPDF(d){
const {jsPDF}=window.jspdf;
const doc=new jsPDF({unit:'pt',format:'a4',compress:true,putOnlyUsedFonts:true});
const W=595,H=842;

doc.setProperties({
  title:d.title_pdf || d.title_book,
  author:d.author,
  subject:d.title_book,
  keywords:(SEO_KEYWORDS[d.lang]||SEO_KEYWORDS.en)(d.title_book,d.author)
});

// Cover image
try {
  const cover=new Image();
  cover.src=`https://images-na.ssl-images-amazon.com/images/P/${d.asin}.01.LZZZZZZZ.jpg`;
  await new Promise((resolve, reject) => {
    cover.onload = resolve;
    cover.onerror = reject;
    setTimeout(reject, 3000);
  });
  doc.addImage(cover,'JPEG',(W-220)/2,40,220,330);
} catch (e) {
  console.log('Cover not loaded, skipping');
}

doc.setFont('times','bold');doc.setFontSize(18);
doc.text(d.title_pdf || d.title_book,W/2,410,{align:'center'});

if(d.lang==='ja'){
  const f=await loadJapaneseFont();
  doc.addFileToVFS('jp.ttf',f);
  doc.addFont('jp.ttf','jp','normal');
  doc.setFont('jp','normal');
}else doc.setFont('times','normal');

doc.setFontSize(12);
const trans = TRANSLATIONS[d.lang] || TRANSLATIONS.en;
doc.text(trans({t:d.title_book,a:d.author}),W/2,460,{align:'center',maxWidth:420});

const x=(W-280)/2,y=685;
doc.setFillColor(16,32,96);
doc.roundedRect(x,y,280,52,10,10,'F');
doc.setTextColor(255,255,255);doc.setFontSize(16);
doc.text(CTA_TEXT[d.lang] || CTA_TEXT.en,W/2,y+32,{align:'center'});
doc.link(x,y,280,52,{url:d.link});
doc.setTextColor(0,0,0);

const total=Math.random()>0.5?21:20;
for(let i=1;i<total;i++){
doc.addPage();
if(i<10){
  // Gunakan placeholder pattern (angka 1 1 1...)
  doc.setFont('courier','normal');
  doc.setFontSize(8);
  let yPos = 30;
  for(let row=0; row<40; row++) {
    let line = '';
    for(let col=0; col<10; col++) {
      line += '11111111111111111 ';
    }
    doc.text(line, 20, yPos);
    yPos += 15;
  }
}else{
  const tv=TEXT_VARIANTS[d.lang]||TEXT_VARIANTS.en;
  const cv=CTA_VARIANTS[d.lang]||CTA_VARIANTS.en;
  doc.setFont('times','normal');
  doc.setFontSize(14);
  doc.text(
    `${d.title_book}\n\n${tv[i%tv.length]}\n\n${cv[i%cv.length]}`,
    40,80,{maxWidth:520}
  );
}}
return doc.output('blob');
}

/* ===== ZIP ===== */
async function generateZIP(){
const zip=new JSZip();
for(const tr of rows.querySelectorAll('tr')){
const d={
output:tr.querySelector('.out').value,
title_pdf:tr.querySelector('.pdf').value,
title_book:tr.querySelector('.title').value,
author:tr.querySelector('.author').value,
link:tr.querySelector('.link').value,
lang:tr.querySelector('.lang').value,
asin:tr.querySelector('.asin').value
};
if(!d.asin)continue;
const name=d.lang==='ja'?`${d.asin}.pdf`:`${slugify(d.output||d.title_book||d.asin)}.pdf`;
zip.file(name,await buildPDF(d));
}
saveAs(await zip.generateAsync({type:'blob'}),'bulk-pdfs.zip');
}
