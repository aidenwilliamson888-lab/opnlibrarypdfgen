<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>📚 OpenLibrary PDF Generator - PRESISI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:Arial, Helvetica, sans-serif; }
body { background:#1a2f3f; display:flex; justify-content:center; padding:20px; }
.container { max-width:1000px; width:100%; background:white; border-radius:30px; padding:25px; box-shadow:0 20px 40px rgba(0,0,0,0.5); border:3px solid #ffaa33; }
h1 { color:#102060; border-left:10px solid #ffaa33; padding-left:20px; margin-bottom:20px; }
.preview-badge { background:#ffaa33; color:#000; padding:5px 15px; border-radius:50px; display:inline-block; margin-bottom:20px; font-weight:bold; }
.form-panel { background:#fff7e8; border-radius:20px; padding:20px; border:3px solid #ffaa33; margin-top:20px; }
.form-group { margin-bottom:20px; }
label { display:block; font-weight:bold; color:#1e3b4f; margin-bottom:5px; }
input, select { width:100%; padding:12px; border:2px solid #ccddee; border-radius:12px; font-size:14px; }
input:focus { outline:none; border-color:#ffaa33; }
.workid-row { display:flex; gap:10px; }
.workid-row button { background:#1e3b4f; color:white; border:none; border-radius:12px; padding:0 20px; font-weight:bold; cursor:pointer; }
.download-row { background:#fff0d4; padding:15px; border-radius:12px; border-left:8px solid #ffaa33; }
.gen-btn { background:#ffaa33; border:none; border-radius:50px; padding:18px; font-size:20px; font-weight:bold; width:100%; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:15px; box-shadow:0 8px 0 #b87d1f; transition:0.1s; margin-top:15px; }
.gen-btn:active { transform:translateY(5px); box-shadow:0 3px 0 #b87d1f; }
#status { margin-top:15px; padding:10px; border-radius:10px; background:#e5f0ff; }
</style>
</head>
<body>
<div class="container">
<h1>📄 OPENLIBRARY PDF GENERATOR</h1>
<div class="preview-badge">⚡ PRESISI 100% · 20-21 Halaman (seperti contoh)</div>

<div class="form-panel">
<div style="display:flex; gap:20px; margin-bottom:20px;">
<div style="flex:1; background:#f0f0f0; padding:10px; border-radius:10px;">
<strong>📋 STRUKTUR HALAMAN:</strong><br>
• Hal 1: Cover + deskripsi<br>
• Hal 2-9: Gambar transparan (tabel 1-125)<br>
• Hal 10: Teks "Kembali ke halaman pertama"<br>
• Hal 11-20/21: Full angka berulang
</div>
</div>

<div class="form-group">
<label>📌 OPENLIBRARY WORK ID</label>
<div class="workid-row">
<input type="text" id="workId" value="OL554603W" placeholder="contoh: OL554603W">
<button id="fetchBtn"><i class="fas fa-download"></i> FETCH</button>
</div>
<div id="bookInfo" style="margin-top:10px; padding:10px; background:#f0f0f0; border-radius:8px;">
To Sir Phillip, With Love - Julia Quinn
</div>
</div>

<div class="form-group download-row">
<label>🔗 LINK DOWNLOAD (ISI MANUAL)</label>
<input type="text" id="downloadLink" value="https://magafiles.com/1863142" placeholder="https://...">
</div>

<div class="form-group">
<label>📄 JUMLAH HALAMAN</label>
<select id="pageCount">
<option value="20">20 Halaman</option>
<option value="21">21 Halaman</option>
</select>
</div>

<button class="gen-btn" id="generateBtn">
📦 GENERATE PDF PRESISI
</button>
<div id="status"></div>
</div>
</div>

<script>
// Data buku default
let currentBook = {
title: 'To Sir Phillip, With Love',
author: 'Julia Quinn',
id: 'OL554603W'
};

// Fetch dari OpenLibrary
document.getElementById('fetchBtn').addEventListener('click', async () => {
const workId = document.getElementById('workId').value.trim();
const statusDiv = document.getElementById('bookInfo');
if (!workId) return;
statusDiv.innerHTML = '⏳ Fetching...';
try {
const res = await fetch(`https://openlibrary.org/works/${workId}.json`);
if (!res.ok) throw new Error('Tidak ditemukan');
const data = await res.json();
let authorName = 'Unknown';
if (data.authors && data.authors[0]) {
const authorKey = data.authors[0].author.key;
const authorRes = await fetch(`https://openlibrary.org${authorKey}.json`);
const authorData = await authorRes.json();
authorName = authorData.name;
}
currentBook = { title: data.title, author: authorName, id: workId };
statusDiv.innerHTML = `<b>${data.title}</b> - ${authorName}`;
} catch (error) {
statusDiv.innerHTML = `❌ Error: ${error.message}`;
}
});

// Fungsi generate gambar transparan (tabel 1-125)
function generateTransparentImage(doc, x, y, w, h) {
// Gambar tabel seperti di file csc.png
doc.setFillColor(240, 240, 240, 0.1); // transparan
doc.roundedRect(x, y, w, h, 5, 5, 'F');
doc.setDrawColor(100, 100, 100);
doc.roundedRect(x, y, w, h, 5, 5, 'S');

// Header tabel
doc.setFontSize(8);
doc.setFont('helvetica', 'bold');
doc.text('Category', x + 20, y + 15);
doc.text('Value (%)', x + 100, y + 15);

// Garis header
doc.line(x + 10, y + 20, x + w - 10, y + 20);

// Isi tabel (1-125)
doc.setFont('helvetica', 'normal');
doc.setFontSize(6);
for(let i = 1; i <= 125; i++) {
let rowY = y + 25 + (i * 8);
if(rowY > y + h - 15) break;
doc.text(i.toString(), x + 20, rowY);
doc.text('100', x + 100, rowY);
}
}

// Fungsi generate baris angka (seperti contoh)
function generateNumberRow() {
let blok = [];
for (let i = 0; i < 9; i++) {
if (i === 5) blok.push('2');
else blok.push('1'.repeat(17));
}
return blok.join(' ');
}

// Generate PDF
document.getElementById('generateBtn').addEventListener('click', async () => {
const { jsPDF } = window.jspdf;
const status = document.getElementById('status');
status.innerHTML = '⏳ Membuat PDF...';

try {
const totalPages = parseInt(document.getElementById('pageCount').value) || 20;
const downloadLink = document.getElementById('downloadLink').value;
const book = currentBook;

const pdf = new jsPDF({
orientation: 'portrait',
unit: 'pt',
format: 'a4'
});

const pageWidth = pdf.internal.pageSize.getWidth();
const pageHeight = pdf.internal.pageSize.getHeight();
const leftMargin = 50;

// Halaman 1: COVER
pdf.setFillColor(16, 32, 96);
pdf.rect(0, 0, pageWidth, pageHeight, 'F');
pdf.setTextColor(255, 255, 255);
pdf.setFont('times', 'bold');
pdf.setFontSize(24);
pdf.text(book.title, pageWidth/2, 200, { align: 'center' });
pdf.setFontSize(18);
pdf.text(`by ${book.author}`, pageWidth/2, 250, { align: 'center' });
pdf.setFontSize(12);
pdf.text('FREE EBOOK DOWNLOAD', pageWidth/2, 350, { align: 'center' });
pdf.setTextColor(255, 255, 255);

// Halaman 2-9: GAMBAR TRANSPARAN (tabel 1-125)
for(let page = 2; page <= 9; page++) {
pdf.addPage();

// Background putih
pdf.setFillColor(255, 255, 255);
pdf.rect(0, 0, pageWidth, pageHeight, 'F');

// Gambar tabel transparan di tengah
generateTransparentImage(pdf, 50, 100, 400, 600);

// Tambah teks transparan
pdf.setGState(new pdf.GState({ opacity: 0.3 }));
pdf.setFont('helvetica', 'bold');
pdf.setFontSize(60);
pdf.setTextColor(200, 200, 200);
pdf.text('SAMPLE', pageWidth/2, pageHeight/2, { align: 'center', angle: 45 });
pdf.setGState(new pdf.GState({ opacity: 1 }));
}

// Halaman 10: TEKS KEMBALI
pdf.addPage();
pdf.setFillColor(255, 255, 255);
pdf.rect(0, 0, pageWidth, pageHeight, 'F');
pdf.setFont('helvetica', 'bold');
pdf.setFontSize(20);
pdf.setTextColor(200, 80, 0);
pdf.text('Kembali ke halaman pertama', pageWidth/2, pageHeight/2 - 40, { align: 'center' });
pdf.setFontSize(14);
pdf.setTextColor(0, 0, 200);
pdf.text(downloadLink, pageWidth/2, pageHeight/2, { align: 'center' });
pdf.setFontSize(12);
pdf.setTextColor(100, 100, 100);
pdf.text('dan klik link di atas untuk mendownload ebook lengkap', pageWidth/2, pageHeight/2 + 40, { align: 'center' });

// Halaman 11 - totalPages: FULL ANGKA
for(let page = 11; page <= totalPages; page++) {
pdf.addPage();
pdf.setFillColor(255, 255, 255);
pdf.rect(0, 0, pageWidth, pageHeight, 'F');

let yPos = 70;
for(let row = 0; row < 32; row++) {
pdf.setFont('courier', 'normal');
pdf.setFontSize(10);
pdf.setTextColor(80, 80, 80);
pdf.text(generateNumberRow(), leftMargin, yPos);
yPos += 22;
}
}

// Simpan PDF
const filename = `${book.title.replace(/[^a-z0-9]/gi, '_')}_${book.id}.pdf`;
pdf.save(filename);
status.innerHTML = '✅ PDF BERHASIL! Format persis seperti contoh.';

} catch (error) {
status.innerHTML = `❌ Error: ${error.message}`;
console.error(error);
}
});

// Trigger fetch awal
window.addEventListener('load', () => {
document.getElementById('fetchBtn').click();
});
</script>
</body>
</html>
